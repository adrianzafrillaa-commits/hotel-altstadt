<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Altstadt Luzern — Concierge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    #chat-wrapper {
      width: 420px;
      height: 680px;
      background: #fafaf8;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    #chat-header {
      background: #1a1a1a;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #hotel-logo {
      width: 44px;
      height: 44px;
      background: #c9a96e;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #1a1a1a;
      font-weight: bold;
      font-family: Georgia, serif;
      flex-shrink: 0;
    }
    #header-info { flex: 1; }
    #header-info h3 {
      font-size: 14px;
      font-weight: normal;
      color: #ffffff;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: -apple-system, sans-serif;
    }
    #header-info p {
      font-size: 11px;
      color: #c9a96e;
      margin-top: 3px;
      letter-spacing: 0.5px;
      font-family: -apple-system, sans-serif;
    }
    #online-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #888;
      font-family: -apple-system, sans-serif;
    }
    #online-dot {
      width: 7px;
      height: 7px;
      background: #4caf50;
      border-radius: 50%;
    }
    #lang-bar {
      background: #111;
      padding: 8px 1.5rem;
      display: flex;
      gap: 6px;
    }
    .lang-btn {
      padding: 4px 10px;
      border-radius: 2px;
      font-size: 11px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      cursor: pointer;
      letter-spacing: 0.5px;
      font-family: -apple-system, sans-serif;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: #c9a96e;
      color: #1a1a1a;
      border-color: #c9a96e;
      font-weight: 600;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #fafaf8;
    }
    .msg { display: flex; gap: 10px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      font-family: -apple-system, sans-serif;
    }
    .msg.bot .msg-avatar { background: #1a1a1a; color: #c9a96e; }
    .msg.user .msg-avatar { background: #e8e8e4; color: #666; }
    .bubble {
      max-width: 76%;
      padding: 10px 14px;
      font-size: 13.5px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .msg.bot .bubble {
      background: #ffffff;
      color: #2a2a2a;
      border: 1px solid #e8e8e4;
      border-radius: 0 8px 8px 8px;
    }
    .msg.user .bubble {
      background: #1a1a1a;
      color: #ffffff;
      border-radius: 8px 0 8px 8px;
      font-family: -apple-system, sans-serif;
      font-size: 13px;
    }
    .typing-bubble {
      background: #ffffff;
      border: 1px solid #e8e8e4;
      border-radius: 0 8px 8px 8px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot {
      width: 6px;
      height: 6px;
      background: #c9a96e;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-4px); opacity: 1; }
    }
    #quick-btns {
      padding: 0 1.5rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: #fafaf8;
    }
    .quick-btn {
      padding: 6px 12px;
      border-radius: 2px;
      font-size: 11.5px;
      border: 1px solid #d4d4cc;
      background: #fff;
      color: #555;
      cursor: pointer;
      letter-spacing: 0.3px;
      font-family: -apple-system, sans-serif;
      transition: all 0.15s;
    }
    .quick-btn:hover { border-color: #c9a96e; color: #c9a96e; }
    #input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid #e8e8e4;
      display: flex;
      gap: 8px;
      background: #fff;
      align-items: center;
    }
    #user-input {
      flex: 1;
      border: 1px solid #e0e0d8;
      border-radius: 2px;
      padding: 10px 14px;
      font-size: 13px;
      outline: none;
      font-family: Georgia, serif;
      color: #2a2a2a;
      background: #fafaf8;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: #c9a96e; }
    #user-input::placeholder { color: #aaa; font-style: italic; }
    #send-btn {
      width: 40px;
      height: 40px;
      background: #1a1a1a;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #c9a96e; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; fill: white; }
    #powered-by {
      text-align: center;
      padding: 6px;
      font-size: 10px;
      color: #bbb;
      background: #fff;
      letter-spacing: 0.5px;
      font-family: -apple-system, sans-serif;
    }
    #powered-by span { color: #c9a96e; }
  </style>
</head>
<body>

<div id="chat-wrapper">
  <div id="chat-header">
    <div id="hotel-logo">A</div>
    <div id="header-info">
      <h3>Hotel Altstadt Luzern</h3>
      <p>Virtual Concierge · 24h</p>
    </div>
    <div id="online-status">
      <div id="online-dot"></div>
      Online
    </div>
  </div>

  <div id="lang-bar">
    <button class="lang-btn active" onclick="setLang('auto', this)">Auto</button>
    <button class="lang-btn" onclick="setLang('en', this)">EN</button>
    <button class="lang-btn" onclick="setLang('de', this)">DE</button>
    <button class="lang-btn" onclick="setLang('fr', this)">FR</button>
    <button class="lang-btn" onclick="setLang('es', this)">ES</button>
    <button class="lang-btn" onclick="setLang('it', this)">IT</button>
    <button class="lang-btn" onclick="setLang('zh', this)">中文</button>
  </div>

  <div id="messages"></div>

  <div id="quick-btns">
    <button class="quick-btn" onclick="sendQuick('What time is check-in and check-out?')">Check-in / Check-out</button>
    <button class="quick-btn" onclick="sendQuick('Is breakfast included?')">Breakfast</button>
    <button class="quick-btn" onclick="sendQuick('Do you have parking?')">Parking</button>
    <button class="quick-btn" onclick="sendQuick('I would like to book a room')">Book a room</button>
  </div>

  <div id="input-area">
    <input type="text" id="user-input" placeholder="Ask anything..." />
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div id="powered-by">Powered by <span>AI Concierge</span> · Hotel Altstadt Luzern</div>
</div>

<script>
  var historial = [];
  var currentLang = 'auto';

  window.onload = function() {
    document.getElementById("user-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });
    addMessage("Welcome to Hotel Altstadt Luzern. I am your virtual concierge, available 24 hours a day.\n\nHow may I assist you today?", "bot");
  };

  function setLang(lang, btn) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }

  function addMessage(text, who) {
    var messages = document.getElementById("messages");
    var div = document.createElement("div");
    div.className = "msg " + who;
    var initials = who === 'bot' ? 'AC' : 'You';
    div.innerHTML = '<div class="msg-avatar">' + initials + '</div><div class="bubble">' + text + '</div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    var messages = document.getElementById("messages");
    var div = document.createElement("div");
    div.className = "msg bot";
    div.id = "typing-indicator";
    div.innerHTML = '<div class="msg-avatar">AC</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function hideTyping() {
    var t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }

  function setLoading(on) {
    document.getElementById("send-btn").disabled = on;
    document.getElementById("user-input").disabled = on;
  }

  function sendMessage() {
    var input = document.getElementById("user-input");
    var text = input.value.trim();
    if (!text) return;

    document.getElementById("quick-btns").style.display = "none";
    input.value = "";

    var finalText = text;
    if (currentLang !== 'auto') {
      var langNames = { en: 'English', de: 'German', fr: 'French', es: 'Spanish', it: 'Italian', zh: 'Mandarin Chinese' };
      finalText = text + ' [Please respond in ' + langNames[currentLang] + ']';
    }

    addMessage(text, "user");
    historial.push({ role: "user", content: finalText });
    setLoading(true);
    showTyping();

    fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: historial })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      hideTyping();
      if (data.error) {
        addMessage("I apologize, there seems to be a technical issue. Please try again.", "bot");
        historial.pop();
      } else {
        addMessage(data.reply, "bot");
        historial.push({ role: "assistant", content: data.reply });
      }
      setLoading(false);
      document.getElementById("user-input").focus();
    })
    .catch(function() {
      hideTyping();
      addMessage("I apologize, there seems to be a technical issue. Please try again.", "bot");
      historial.pop();
      setLoading(false);
    });
  }

  function sendQuick(text) {
    document.getElementById("user-input").value = text;
    sendMessage();
  }
</script>

</body>
</html>
